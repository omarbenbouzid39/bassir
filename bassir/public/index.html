<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بصير</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
html,body{height:100%;overflow:hidden}
.app{display:grid;grid-template-columns:72px 1fr 300px;height:100vh;overflow:hidden}
.sidebar{display:flex;flex-direction:column;align-items:center;padding:20px 0;border-left:1px solid var(--border);gap:6px;background:var(--surface);z-index:10}
.sidebar-logo{font-family:var(--font-mono);font-size:14px;color:var(--accent);writing-mode:vertical-rl;letter-spacing:4px;margin-bottom:20px}
.nav-btn{width:44px;height:44px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;position:relative;text-decoration:none}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.nav-btn:hover,.nav-btn.active{background:rgba(200,245,100,0.1);color:var(--accent)}
.nav-tooltip{position:absolute;right:54px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:4px 10px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.2s;font-family:var(--font-main)}
.nav-btn:hover .nav-tooltip{opacity:1}
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:6px}
.feed-container{position:relative;overflow:hidden;background:#000}
.feed{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
.feed::-webkit-scrollbar{display:none}
.skeleton-slide{height:100vh;scroll-snap-align:start;background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.video-slide{height:100vh;scroll-snap-align:start;position:relative;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
.video-el{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
.video-slide::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.15) 40%,transparent 70%);pointer-events:none;z-index:1}
.slide-top{position:absolute;top:20px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:center;z-index:5}
.cat-badge-video{background:rgba(200,245,100,.15);border:1px solid rgba(200,245,100,.3);color:var(--accent);font-size:11px;font-weight:600;padding:4px 12px;border-radius:var(--radius-full);backdrop-filter:blur(8px);display:flex;align-items:center;gap:5px}
.slide-time{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.5)}
.slide-actions{position:absolute;left:16px;bottom:140px;z-index:5;display:flex;flex-direction:column;gap:18px;align-items:center}
.action-btn{display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;color:white;cursor:pointer;transition:transform 0.2s}
.action-btn:hover{transform:scale(1.12)}
.action-btn:active{transform:scale(.95)}
.action-icon{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.action-btn.liked .action-icon{background:rgba(245,100,100,.25);border-color:#f56464;color:#f56464}
.action-btn.saved .action-icon{background:rgba(200,245,100,.15);border-color:var(--accent);color:var(--accent)}
.action-count{font-size:11px;color:rgba(255,255,255,.75);font-weight:500}
.slide-info{position:absolute;bottom:32px;right:20px;left:80px;z-index:5}
.slide-title{font-size:20px;font-weight:700;line-height:1.3;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.slide-desc{font-size:13px;color:rgba(255,255,255,.65);line-height:1.6;max-width:380px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.slide-author{display:flex;align-items:center;gap:10px;margin-top:12px}
.author-ava{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
.author-name{font-size:13px;font-weight:600}
.author-handle{font-size:11px;color:rgba(255,255,255,.55)}
.tap-hint{position:absolute;bottom:200px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);padding:8px 16px;border-radius:var(--radius-full);font-size:12px;color:white;backdrop-filter:blur(8px);z-index:6;display:flex;align-items:center;gap:6px;cursor:pointer}
.top-progress{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,.08);z-index:10}
.top-progress-fill{height:100%;background:var(--accent);width:0%;transition:width .15s linear}
.empty-feed{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted);text-align:center;padding:20px}
.right-panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.panel-title{font-size:14px;font-weight:700}.panel-sub{font-size:11px;color:var(--muted)}
.cats-scroll{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.cats-scroll::-webkit-scrollbar{display:none}
.now-playing{display:flex;align-items:center;gap:10px;padding:11px 20px;background:rgba(200,245,100,.05);border-bottom:1px solid rgba(200,245,100,.1)}
.playing-bars{display:flex;align-items:flex-end;gap:2px;height:16px}
.bar{width:3px;background:var(--accent);border-radius:2px;animation:audioBar .8s ease infinite alternate}
.bar:nth-child(2){animation-delay:.2s}.bar:nth-child(3){animation-delay:.4s}
@keyframes audioBar{from{height:4px}to{height:14px}}
.playing-text{font-size:12px;color:var(--accent);font-weight:500}
.playing-title{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.trending-list{flex:1;overflow-y:auto;padding:14px 20px;scrollbar-width:none}
.trending-list::-webkit-scrollbar{display:none}
.trending-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.trending-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity 0.2s;align-items:center}
.trending-item:hover{opacity:.7}
.t-thumb{width:50px;height:70px;border-radius:8px;flex-shrink:0;object-fit:cover;background:var(--surface2)}
.t-thumb-placeholder{width:50px;height:70px;border-radius:8px;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--muted)}
.t-num{font-family:var(--font-mono);font-size:18px;font-weight:700;color:rgba(255,255,255,.06);width:22px;flex-shrink:0}
.t-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-meta{font-size:11px;color:var(--muted)}
.panel-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px}
.mute-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);border:1px solid var(--border);padding:20px 28px;border-radius:var(--radius-lg);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(12px)}
.mute-toast.show{opacity:1}

/* Comments */
.comments-overlay{position:fixed;inset:0;z-index:300;display:none;align-items:flex-end;justify-content:center}
.comments-overlay.show{display:flex}
.comments-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px)}
.comments-panel{position:relative;z-index:1;background:var(--surface);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-width:520px;max-height:75vh;display:flex;flex-direction:column}
.comments-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.comments-title{font-size:15px;font-weight:700}
.c-close{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;align-items:center;border-radius:6px;transition:color .2s}
.c-close:hover{color:var(--text)}
.comments-list{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;scrollbar-width:none}
.comments-list::-webkit-scrollbar{display:none}
.c-item{display:flex;gap:10px;align-items:flex-start}
.c-ava{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;flex-shrink:0}
.c-body{flex:1;min-width:0}
.c-name{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:3px}
.c-text{font-size:13px;line-height:1.5}
.c-time{font-size:11px;color:var(--muted);margin-top:3px}
.comments-input-row{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center}
.c-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:10px 14px;border-radius:var(--radius-full);outline:none;font-family:var(--font-main);transition:border-color .2s}
.c-input:focus{border-color:rgba(200,245,100,.4)}
.c-input::placeholder{color:var(--muted)}
.c-send{width:38px;height:38px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.c-send:hover{opacity:.85}
.c-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
@keyframes hpop{0%{opacity:1;transform:translate(-50%,-50%) scale(.4)}60%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}
@media(max-width:900px){.app{grid-template-columns:60px 1fr}.right-panel{display:none}}
@media(max-width:600px){.app{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="sidebar-logo">بصير</div>
    <button class="nav-btn active" onclick="setNav(this)">
      <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nav-tooltip">الرئيسية</span>
    </button>
    <button class="nav-btn" onclick="goSaved()">
      <svg viewBox="0 0 24 24"><path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span class="nav-tooltip">المحفوظات</span>
    </button>
    <button class="nav-btn" onclick="setNav(this)">
      <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      <span class="nav-tooltip">الرائج</span>
    </button>
    <a href="/search.html" class="nav-btn">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span class="nav-tooltip">بحث</span>
    </a>
    <div class="sidebar-bottom">
      <a href="/upload.html" class="nav-btn">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span class="nav-tooltip">رفع مقطع</span>
      </a>
      <button class="nav-btn" onclick="toggleNotifs()" id="bellBtn" style="position:relative">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="nav-tooltip">الإشعارات</span>
        <span id="notifBadge" style="position:absolute;top:6px;left:6px;width:8px;height:8px;border-radius:50%;background:var(--danger);display:none"></span>
      </button>
      <a href="/profile.html" class="avatar avatar-sm" id="sidebarAvatar" style="border:2px solid var(--border);text-decoration:none">أ</a>
    </div>
  </nav>

  <main class="feed-container">
    <div class="top-progress"><div class="top-progress-fill" id="progress"></div></div>
    <div class="feed" id="feed">
      <div class="skeleton-slide"></div>
      <div class="skeleton-slide"></div>
    </div>
    <div class="mute-toast" id="muteToast"></div>
  </main>

  <aside class="right-panel">
    <div class="panel-header">
      <div><div class="panel-title">بصير</div><div class="panel-sub">تغذية بصرية يومية</div></div>
      <span style="color:var(--accent)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
      </span>
    </div>
    <div class="now-playing">
      <div class="playing-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
      <div style="min-width:0">
        <div class="playing-text">يُعرض الآن</div>
        <div class="playing-title" id="nowPlayingTitle">—</div>
      </div>
    </div>
    <div class="cats-scroll" id="catsRow"></div>
    <div class="trending-list">
      <div class="trending-label">الأكثر مشاهدة</div>
      <div id="trendingList"><div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">جاري التحميل...</div></div>
    </div>
    <div class="panel-footer">
      <a href="/upload.html" class="btn btn-primary btn-full">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        رفع مقطع
      </a>
      <button class="btn btn-icon btn-secondary" id="muteBtn" onclick="toggleMute()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
      </button>
      <button class="btn btn-icon btn-secondary" onclick="shareVideo()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
    </div>

</div>

<!-- Comments Panel -->
<div class="comments-overlay" id="commentsOverlay">
  <div class="comments-backdrop" onclick="closeComments()"></div>
  <div class="comments-panel">
    <div class="comments-header">
      <div class="comments-title">
        التعليقات
        <span id="commentsCountLabel" style="color:var(--muted);font-weight:400;font-size:13px"></span>
      </div>
      <button class="c-close" onclick="closeComments()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="comments-list" id="commentsList"></div>
    <div class="comments-input-row">
      <input class="c-input" id="commentInput" placeholder="اكتب تعليقاً..."
        onkeydown="if(event.key==='Enter')sendComment()">
      <button class="c-send" onclick="sendComment()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

<script src="api.js"></script>
<script>
const CATS=[
  {val:'all',    label:'الكل'},
  {val:'nature', label:'طبيعة'},
  {val:'art',    label:'فن'},
  {val:'arch',   label:'عمارة'},
  {val:'food',   label:'طعام'},
  {val:'sea',    label:'بحر'},
  {val:'city',   label:'مدينة'},
];

let videos=[], currentIndex=0, muted=true, currentCat='all', page=1, loading=false, hasMore=true;
// ⚠️ MongoDB IDs هي strings — نستخدم String دائماً
const liked = new Set();
const saved  = new Set();
let activeCommentVid = null;

window.addEventListener('load', async () => {
  lucide.createIcons();
  const u = API.user();
  if (u) document.getElementById('sidebarAvatar').textContent = u.name?.[0] || 'أ';
  renderCats();
  await Promise.all([loadFeed(), loadTrending()]);
  // ✅ دعم الانتقال المباشر لفيديو من profile.html
  const params = new URLSearchParams(location.search);
  const vidParam = params.get('vid');
  if (vidParam) {
    // ننتظر render ثم ننتقل للفيديو
    setTimeout(() => {
      const slide = document.getElementById('slide-' + vidParam);
      if (slide) slide.scrollIntoView({ behavior: 'smooth' });
    }, 600);
  }
  document.getElementById('feed').addEventListener('scroll', () => {
    const f = document.getElementById('feed');
    if (f.scrollTop + f.clientHeight >= f.scrollHeight - 500 && !loading && hasMore) loadMore();
  });
});

function renderCats() {
  document.getElementById('catsRow').innerHTML = CATS.map((c,i) =>
    `<button class="cat-chip${i===0?' active':''}" onclick="loadCategory('${c.val}',this)">${c.label}</button>`
  ).join('');
}

async function loadFeed() {
  loading = true;
  try {
    const res = await API.videos.feed(currentCat, 1);
    videos = res.videos || []; hasMore = videos.length < (res.total||0); page = 1;
    videos.forEach(v => {
      if (v.is_liked) liked.add(String(v.id));
      if (v.is_saved) saved.add(String(v.id));
    });
    renderFeed();
  } catch(e) {
    document.getElementById('feed').innerHTML = `
      <div class="empty-feed">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity=".4"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
        <div style="font-size:16px;font-weight:600;color:var(--text)">لا توجد مقاطع بعد</div>
        <div>كن أول من يشارك لحظة بصرية!</div>
        <a href="/upload.html" class="btn btn-primary mt-8">رفع أول مقطع</a>
      </div>`;
    lucide.createIcons();
  }
  loading = false;
}

async function loadMore() {
  loading = true; page++;
  try {
    const res = await API.videos.feed(currentCat, page);
    const nv = res.videos || [];
    nv.forEach(v => {
      if (v.is_liked) liked.add(String(v.id));
      if (v.is_saved) saved.add(String(v.id));
    });
    videos = [...videos, ...nv]; hasMore = videos.length < (res.total||0);
    appendSlides(nv);
  } catch{}
  loading = false;
}

async function loadCategory(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  liked.clear(); saved.clear();
  await loadFeed();
}

function renderFeed() {
  if (!videos.length) {
    document.getElementById('feed').innerHTML = `
      <div class="empty-feed">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity=".4"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <div style="font-size:15px;font-weight:600;color:var(--text)">لا توجد مقاطع في هذه الفئة</div>
        <a href="/upload.html" class="btn btn-primary mt-8">أضف أول مقطع</a>
      </div>`;
    lucide.createIcons(); return;
  }
  document.getElementById('feed').innerHTML = videos.map(buildSlide).join('');
  setupObserver();
  updateNowPlaying(videos[0]);
}

function appendSlides(nv) {
  const feed = document.getElementById('feed');
  nv.forEach(v => {
    const d = document.createElement('div');
    d.innerHTML = buildSlide(v);
    feed.appendChild(d.firstChild);
  });
  setupObserver();
}

function buildSlide(v) {
  const id  = String(v.id);
  const il  = liked.has(id);
  const is_ = saved.has(id);
  const ini = (v.author_name || 'م')[0];
  const catLabel = UI.catLabel(v.category);

  return `<div class="video-slide" id="slide-${id}" data-id="${id}">
    ${v.video_url
      ? `<video class="video-el" id="vid-${id}" src="${v.video_url}"
           ${v.thumbnail_url ? `poster="${v.thumbnail_url}"` : ''}
           loop playsinline muted preload="metadata"></video>`
      : `<div style="position:absolute;inset:0;background:linear-gradient(135deg,#1a1a2e,#0f3460);display:flex;align-items:center;justify-content:center;">
           <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1" opacity=".3"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
         </div>`
    }
    <div class="slide-top">
      <span class="cat-badge-video">${catLabel}</span>
      <span class="slide-time">${UI.timeAgo(v.created_at)}</span>
    </div>
    <div class="slide-actions">

      <!-- Like -->
      <button class="action-btn${il ? ' liked' : ''}" id="lb-${id}" onclick="toggleLike('${id}')">
        <div class="action-icon">
          <svg width="20" height="20" viewBox="0 0 24 24"
            fill="${il ? '#f56464' : 'none'}"
            stroke="${il ? '#f56464' : 'white'}"
            stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <span class="action-count" id="lc-${id}">${UI.formatNum(v.likes_count)}</span>
      </button>

      <!-- Save -->
      <button class="action-btn${is_ ? ' saved' : ''}" id="sb-${id}" onclick="toggleSave('${id}')">
        <div class="action-icon">
          <svg width="20" height="20" viewBox="0 0 24 24"
            fill="${is_ ? 'var(--accent)' : 'none'}"
            stroke="${is_ ? 'var(--accent)' : 'white'}"
            stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <span class="action-count" id="sc-${id}">${UI.formatNum(v.saves_count)}</span>
      </button>

      <!-- Comments -->
      <button class="action-btn" onclick="openComments('${id}', ${v.comments_count || 0})">
        <div class="action-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <span class="action-count" id="cc-${id}">${UI.formatNum(v.comments_count || 0)}</span>
      </button>

      <!-- Share -->
      <button class="action-btn" onclick="shareVideo()">
        <div class="action-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </div>
        <span class="action-count">شارك</span>
      </button>
    </div>

    <div class="slide-info">
      <div class="slide-title">${v.title}</div>
      <div class="slide-desc">${v.description || ''}</div>
      <div class="slide-author">
        <div class="author-ava">${ini}</div>
        <div>
          <div class="author-name">${v.author_name || 'مجهول'}</div>
          <div class="author-handle">${v.author_handle || ''} · ${UI.formatNum(v.views)} مشاهدة</div>
        </div>
      </div>
    </div>
  </div>`;
}

const viewedSet = new Set(); // ✅ تتبّع الفيديوهات التي تمت مشاهدتها لتجنب التكرار

function setupObserver() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const vid = e.target.querySelector('video');
      if (e.isIntersecting) {
        const id = e.target.dataset.id;
        const v  = videos.find(v => String(v.id) === id);
        if (v) { currentIndex = videos.indexOf(v); updateNowPlaying(v); }
        if (vid) { vid.muted = muted; vid.play().catch(() => showTapHint(e.target)); }
        // ✅ إصلاح المشاهدات: نعدّ كل فيديو مرة واحدة فقط لكل جلسة
        if (id && !viewedSet.has(id)) {
          viewedSet.add(id);
          API.videos.view(id); // لا ننتظر الرد — fire and forget
          // تحديث عداد المشاهدات في الـ UI مباشرة
          const slide = document.getElementById('slide-' + id);
          if (slide) {
            const handleEl = slide.querySelector('.author-handle');
            if (handleEl) {
              const vObj = videos.find(x => String(x.id) === id);
              if (vObj) {
                vObj.views = (vObj.views || 0) + 1;
                handleEl.textContent = (vObj.author_handle || '') + ' · ' + UI.formatNum(vObj.views) + ' مشاهدة';
              }
            }
          }
        }
      } else {
        if (vid) { vid.pause(); vid.currentTime = 0; }
        e.target.querySelector('.tap-hint')?.remove();
      }
    });
  }, { threshold: 0.7 });
  document.querySelectorAll('.video-slide').forEach(s => obs.observe(s));
}

function showTapHint(slide) {
  if (slide.querySelector('.tap-hint')) return;
  const hint = document.createElement('div');
  hint.className = 'tap-hint';
  hint.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg> اضغط لتشغيل الصوت`;
  hint.onclick = () => {
    muted = false;
    document.querySelectorAll('.feed video').forEach(v => { v.muted = false; v.play().catch(()=>{}); });
    hint.remove();
    updateMuteIcon();
  };
  slide.appendChild(hint);
}

function updateNowPlaying(v) {
  if (!v) return;
  document.getElementById('nowPlayingTitle').textContent = v.title;
  document.getElementById('progress').style.width = ((currentIndex+1)/videos.length*100)+'%';
}

// ── Like ──────────────────────────────────────────────────────────────────────
async function toggleLike(id) {
  if (!API.isLoggedIn()) { window.location.href = '/login.html'; return; }
  const sid = String(id);
  const btn  = document.getElementById(`lb-${sid}`);
  const cnt  = document.getElementById(`lc-${sid}`);
  const svg  = btn?.querySelector('svg');
  if (!btn) return;

  try {
    const res = await API.videos.like(sid);
    if (res.liked) {
      liked.add(sid);
      btn.classList.add('liked');
      if (svg) { svg.setAttribute('fill','#f56464'); svg.setAttribute('stroke','#f56464'); }
      heartPop();
    } else {
      liked.delete(sid);
      btn.classList.remove('liked');
      if (svg) { svg.setAttribute('fill','none'); svg.setAttribute('stroke','white'); }
    }
    if (cnt) cnt.textContent = UI.formatNum(res.count);
  } catch(e) { UI.error(e.message); }
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function toggleSave(id) {
  if (!API.isLoggedIn()) { window.location.href = '/login.html'; return; }
  const sid = String(id);
  const btn  = document.getElementById(`sb-${sid}`);
  const svg  = btn?.querySelector('svg');
  if (!btn) return;

  try {
    const res = await API.videos.save(sid);
    if (res.saved) {
      saved.add(sid);
      btn.classList.add('saved');
      if (svg) { svg.setAttribute('fill','var(--accent)'); svg.setAttribute('stroke','var(--accent)'); }
      UI.success('تم الحفظ ✓');
    } else {
      saved.delete(sid);
      btn.classList.remove('saved');
      if (svg) { svg.setAttribute('fill','none'); svg.setAttribute('stroke','white'); }
      UI.toast('تم إلغاء الحفظ');
    }
  } catch(e) { UI.error(e.message); }
}

// ── Comments ──────────────────────────────────────────────────────────────────
async function openComments(id, count) {
  activeCommentVid = String(id);
  document.getElementById('commentsCountLabel').textContent = count ? ` (${count})` : '';
  document.getElementById('commentsList').innerHTML = '<div class="c-empty">جاري التحميل...</div>';
  document.getElementById('commentsOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';

  try {
    const list = await API.videos.comments(id);
    renderComments(list);
  } catch {
    document.getElementById('commentsList').innerHTML = '<div class="c-empty">فشل تحميل التعليقات</div>';
  }
}

function closeComments() {
  document.getElementById('commentsOverlay').classList.remove('show');
  document.body.style.overflow = '';
  activeCommentVid = null;
  document.getElementById('commentInput').value = '';
}

function renderComments(list) {
  const el = document.getElementById('commentsList');
  if (!list.length) {
    el.innerHTML = '<div class="c-empty">لا توجد تعليقات — كن أول من يعلّق!</div>';
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="c-item">
      <div class="c-ava">${(c.name||'م')[0]}</div>
      <div class="c-body">
        <div class="c-name">${esc(c.handle || c.name || 'مستخدم')}</div>
        <div class="c-text">${esc(c.content)}</div>
        <div class="c-time">${UI.timeAgo(c.created_at)}</div>
      </div>
    </div>`).join('');
}

async function sendComment() {
  if (!API.isLoggedIn()) { window.location.href = '/login.html'; return; }
  const input   = document.getElementById('commentInput');
  const content = input.value.trim();
  if (!content || !activeCommentVid) return;
  input.value = '';

  try {
    const c = await API.videos.addComment(activeCommentVid, content);

    // أضف التعليق فوراً في الأعلى
    const el  = document.getElementById('commentsList');
    const emp = el.querySelector('.c-empty');
    if (emp) emp.remove();
    const div = document.createElement('div');
    div.className = 'c-item';
    div.innerHTML = `
      <div class="c-ava">${(c.name||'أ')[0]}</div>
      <div class="c-body">
        <div class="c-name">${esc(c.handle || c.name)}</div>
        <div class="c-text">${esc(c.content)}</div>
        <div class="c-time">الآن</div>
      </div>`;
    el.insertBefore(div, el.firstChild);

    // تحديث عداد التعليقات على الشريحة
    const cc = document.getElementById(`cc-${activeCommentVid}`);
    if (cc) cc.textContent = UI.formatNum((parseInt(cc.textContent.replace(/[^\d]/g,''))||0) + 1);
    const lbl = document.getElementById('commentsCountLabel');
    if (lbl) {
      const n = (parseInt(lbl.textContent.replace(/[^\d]/g,''))||0) + 1;
      lbl.textContent = ` (${n})`;
    }
  } catch(e) { UI.error(e.message); input.value = content; }
}

// ── Trending ──────────────────────────────────────────────────────────────────
async function loadTrending() {
  try {
    const list = await API.videos.trending();
    document.getElementById('trendingList').innerHTML = list.length
      ? list.map((v,i) => `
        <div class="trending-item" onclick="jumpToVideo('${v.id}')">
          <div class="t-num">0${i+1}</div>
          ${v.thumbnail_url
            ? `<img class="t-thumb" src="${v.thumbnail_url}" loading="lazy">`
            : `<div class="t-thumb-placeholder"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></div>`}
          <div style="min-width:0">
            <div class="t-title">${esc(v.title)}</div>
            <div class="t-meta">${UI.formatNum(v.views)} مشاهدة · ${UI.formatNum(v.likes_count)} إعجاب</div>
          </div>
        </div>`).join('')
      : '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">لا توجد مقاطع بعد</div>';
  } catch {}
}

function jumpToVideo(id) {
  const idx = videos.findIndex(v => String(v.id) === String(id));
  if (idx >= 0) jumpTo(idx);
}
function jumpTo(i) {
  const slides = document.querySelectorAll('.video-slide');
  if (slides[i]) slides[i].scrollIntoView({ behavior:'smooth' });
}

function toggleMute() {
  muted = !muted;
  document.querySelectorAll('.feed video').forEach(v => v.muted = muted);
  const t = document.getElementById('muteToast');
  t.innerHTML = muted
    ? `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`
    : `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 900);
  updateMuteIcon();
}
function updateMuteIcon() {
  const mb = document.getElementById('muteBtn');
  mb.innerHTML = muted
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;
}

function shareVideo() { navigator.clipboard?.writeText(location.href).then(()=>UI.success('تم نسخ الرابط')); }
function goSaved()    { if(!API.isLoggedIn()){window.location.href='/login.html';return;} window.location.href='/profile.html'; }
function setNav(btn)  { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }

function heartPop() {
  const h = document.createElement('div');
  h.style.cssText='position:fixed;z-index:999;left:50%;top:50%;pointer-events:none;color:#f56464;animation:hpop .6s ease forwards';
  h.innerHTML='<svg width="56" height="56" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
  document.body.appendChild(h); setTimeout(()=>h.remove(), 650);
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const _s = document.createElement('style');
_s.textContent = '@keyframes hpop{0%{opacity:1;transform:translate(-50%,-50%) scale(.4)}60%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}';
document.head.appendChild(_s);

document.addEventListener('keydown', e => {
  if (document.getElementById('commentsOverlay').classList.contains('show')) {
    if (e.key === 'Escape') closeComments();
    return;
  }
  if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); jumpTo(currentIndex+1); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); jumpTo(currentIndex-1); }
  if (e.key === 'm') toggleMute();
});
</script>

<!-- Notifications Panel -->

  </div>
  <div id="notifList" style="max-height:320px;overflow-y:auto;scrollbar-width:none">

  </div>
