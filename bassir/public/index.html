<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بصير</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
html,body{height:100%;overflow:hidden}
.app{display:grid;grid-template-columns:72px 1fr 300px;height:100vh;overflow:hidden}
.sidebar{display:flex;flex-direction:column;align-items:center;padding:20px 0;border-left:1px solid var(--border);gap:6px;background:var(--surface);z-index:10}
.sidebar-logo{font-family:var(--font-mono);font-size:14px;color:var(--accent);writing-mode:vertical-rl;letter-spacing:4px;margin-bottom:20px}
.nav-btn{width:44px;height:44px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;position:relative}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.nav-btn:hover,.nav-btn.active{background:rgba(200,245,100,0.1);color:var(--accent)}
.nav-tooltip{position:absolute;right:54px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:4px 10px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.2s;font-family:var(--font-main)}
.nav-btn:hover .nav-tooltip{opacity:1}
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:6px}
.feed-container{position:relative;overflow:hidden;background:#000}
.feed{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
.feed::-webkit-scrollbar{display:none}
.skeleton-slide{height:100vh;scroll-snap-align:start;background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.video-slide{height:100vh;scroll-snap-align:start;position:relative;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
.video-el{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
.video-slide::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.15) 40%,transparent 70%);pointer-events:none;z-index:1}
.slide-top{position:absolute;top:20px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:center;z-index:5}
.cat-badge-video{background:rgba(200,245,100,.15);border:1px solid rgba(200,245,100,.3);color:var(--accent);font-size:11px;font-weight:600;padding:4px 12px;border-radius:var(--radius-full);backdrop-filter:blur(8px);display:flex;align-items:center;gap:5px}
.cat-badge-video svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.slide-time{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.5)}
.slide-actions{position:absolute;left:16px;bottom:120px;z-index:5;display:flex;flex-direction:column;gap:20px;align-items:center}
.action-btn{display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;color:white;cursor:pointer;transition:transform 0.2s}
.action-btn:hover{transform:scale(1.15)}
.action-btn:active{transform:scale(.95)}
.action-icon{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.action-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.action-btn.liked .action-icon{background:rgba(245,100,100,.2);border-color:var(--danger);color:var(--danger)}
.action-btn.liked .action-icon svg{fill:var(--danger)}
.action-btn.saved .action-icon{background:rgba(200,245,100,.15);border-color:var(--accent);color:var(--accent)}
.action-btn.saved .action-icon svg{fill:var(--accent)}
.action-count{font-size:11px;color:rgba(255,255,255,.75);font-weight:500}
.slide-info{position:absolute;bottom:32px;right:20px;left:80px;z-index:5}
.slide-title{font-size:20px;font-weight:700;line-height:1.3;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.slide-desc{font-size:13px;color:rgba(255,255,255,.65);line-height:1.6;max-width:380px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.slide-author{display:flex;align-items:center;gap:10px;margin-top:12px}
.author-ava{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
.author-name{font-size:13px;font-weight:600}
.author-handle{font-size:11px;color:rgba(255,255,255,.55)}
.tap-hint{position:absolute;bottom:168px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);padding:8px 16px;border-radius:var(--radius-full);font-size:12px;color:white;backdrop-filter:blur(8px);z-index:6;display:flex;align-items:center;gap:6px;cursor:pointer;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.tap-hint svg{width:14px;height:14px;stroke:white;fill:none;stroke-width:2}
.top-progress{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,.08);z-index:10}
.top-progress-fill{height:100%;background:var(--accent);width:0%;transition:width .15s linear}
.empty-feed{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted);text-align:center;padding:20px}
.empty-feed svg{width:64px;height:64px;stroke:var(--muted);fill:none;stroke-width:1.2;opacity:.4}
.right-panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.panel-title{font-size:14px;font-weight:700}.panel-sub{font-size:11px;color:var(--muted)}
.cats-scroll{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.cats-scroll::-webkit-scrollbar{display:none}
.now-playing{display:flex;align-items:center;gap:10px;padding:11px 20px;background:rgba(200,245,100,.05);border-bottom:1px solid rgba(200,245,100,.1)}
.playing-bars{display:flex;align-items:flex-end;gap:2px;height:16px}
.bar{width:3px;background:var(--accent);border-radius:2px;animation:audioBar .8s ease infinite alternate}
.bar:nth-child(2){animation-delay:.2s}.bar:nth-child(3){animation-delay:.4s}
@keyframes audioBar{from{height:4px}to{height:14px}}
.playing-text{font-size:12px;color:var(--accent);font-weight:500}
.playing-title{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.trending-list{flex:1;overflow-y:auto;padding:14px 20px;scrollbar-width:none}
.trending-list::-webkit-scrollbar{display:none}
.trending-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.trending-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity 0.2s;align-items:center}
.trending-item:hover{opacity:.7}
.t-thumb{width:50px;height:70px;border-radius:8px;flex-shrink:0;background:var(--surface2);overflow:hidden;object-fit:cover}
.t-thumb-placeholder{width:50px;height:70px;border-radius:8px;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--muted)}
.t-thumb-placeholder svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5}
.trending-info{flex:1;min-width:0}
.t-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-meta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.t-meta svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}
.t-num{font-family:var(--font-mono);font-size:18px;font-weight:700;color:rgba(255,255,255,.06);width:22px;flex-shrink:0}
.panel-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px}
.mute-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);border:1px solid var(--border);padding:20px 28px;border-radius:var(--radius-lg);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(12px)}
.mute-toast svg{width:36px;height:36px;stroke:white;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.mute-toast.show{opacity:1}
@keyframes hpop{0%{opacity:1;transform:translate(-50%,-50%) scale(.4)}60%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}
@media(max-width:900px){.app{grid-template-columns:60px 1fr}.right-panel{display:none}}
@media(max-width:600px){.app{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="sidebar-logo">بصير</div>
    <button class="nav-btn active" onclick="setNav(this)"><i data-lucide="house"></i><span class="nav-tooltip">الرئيسية</span></button>
    <button class="nav-btn" onclick="setNav(this)"><i data-lucide="search"></i><span class="nav-tooltip">استكشاف</span></button>
    <button class="nav-btn" onclick="goSaved()"><i data-lucide="bookmark"></i><span class="nav-tooltip">المحفوظات</span></button>
    <button class="nav-btn" onclick="setNav(this)"><i data-lucide="trending-up"></i><span class="nav-tooltip">الرائج</span></button>
    <button class="nav-btn" onclick="setNav(this)"><i data-lucide="bell"></i><span class="nav-tooltip">الإشعارات</span></button>
    <div class="sidebar-bottom">
      <button class="nav-btn" onclick="setNav(this)"><i data-lucide="settings"></i><span class="nav-tooltip">الإعدادات</span></button>
      <a href="/profile.html" class="avatar avatar-sm" id="sidebarAvatar" style="border:2px solid var(--border)">أ</a>
    </div>
  </nav>

  <main class="feed-container">
    <div class="top-progress"><div class="top-progress-fill" id="progress"></div></div>
    <div class="feed" id="feed"><div class="skeleton-slide"></div><div class="skeleton-slide"></div></div>
    <div class="mute-toast" id="muteToast">
      <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
    </div>
  </main>

  <aside class="right-panel">
    <div class="panel-header">
      <div><div class="panel-title">بصير</div><div class="panel-sub">تغذية بصرية يومية</div></div>
      <span style="color:var(--accent)"><i data-lucide="sparkles"></i></span>
    </div>
    <div class="now-playing">
      <div class="playing-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
      <div style="min-width:0"><div class="playing-text">يُعرض الآن</div><div class="playing-title" id="nowPlayingTitle">—</div></div>
    </div>
    <div class="cats-scroll" id="catsRow"></div>
    <div class="trending-list">
      <div class="trending-label">الأكثر مشاهدة</div>
      <div id="trendingList"><div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">جاري التحميل...</div></div>
    </div>
    <div class="panel-footer">
      <a href="/upload.html" class="btn btn-primary btn-full"><i data-lucide="upload"></i> رفع مقطع</a>
      <button class="btn btn-icon btn-secondary" id="muteBtn" onclick="toggleMute()"><i data-lucide="volume-x"></i></button>
      <button class="btn btn-icon btn-secondary" onclick="shareVideo()"><i data-lucide="share-2"></i></button>
    </div>
  </aside>
</div>

<script src="api.js"></script>
<script>
const CATS=[{val:'all',icon:'layout-grid',label:'الكل'},{val:'nature',icon:'leaf',label:'طبيعة'},{val:'art',icon:'palette',label:'فن'},{val:'arch',icon:'landmark',label:'عمارة'},{val:'food',icon:'utensils',label:'طعام'},{val:'sea',icon:'waves',label:'بحر'},{val:'city',icon:'building-2',label:'مدينة'}];
let videos=[],currentIndex=0,muted=true,currentCat='all',page=1,loading=false,hasMore=true;
const liked=new Set(),saved=new Set();

window.addEventListener('load',async()=>{
  lucide.createIcons();
  // تحديث الأفاتار
  const u=API.user();
  if(u) document.getElementById('sidebarAvatar').textContent=u.name[0]||'أ';
  renderCats();
  await Promise.all([loadFeed(),loadTrending()]);
  document.getElementById('feed').addEventListener('scroll',()=>{
    const f=document.getElementById('feed');
    if(f.scrollTop+f.clientHeight>=f.scrollHeight-500&&!loading&&hasMore) loadMore();
  });
});

function renderCats(){
  document.getElementById('catsRow').innerHTML=CATS.map((c,i)=>
    `<button class="cat-chip${i===0?' active':''}" onclick="loadCategory('${c.val}',this)"><i data-lucide="${c.icon}"></i>${c.label}</button>`
  ).join('');
  lucide.createIcons({nodes:[document.getElementById('catsRow')]});
}

async function loadFeed(){
  loading=true;
  try{
    const res=await API.videos.feed(currentCat,1);
    videos=res.videos||[];hasMore=videos.length<(res.total||0);page=1;
    videos.forEach(v=>{if(v.is_liked)liked.add(v.id);if(v.is_saved)saved.add(v.id);});
    renderFeed();
  }catch(e){
    document.getElementById('feed').innerHTML=`
      <div class="empty-feed">
        <i data-lucide="video-off"></i>
        <div style="font-size:16px;font-weight:600;color:var(--text)">لا توجد مقاطع بعد</div>
        <div>كن أول من يشارك لحظة بصرية!</div>
        <a href="/upload.html" class="btn btn-primary mt-8"><i data-lucide="upload"></i> رفع أول مقطع</a>
      </div>`;
    lucide.createIcons();
  }
  loading=false;
}

async function loadMore(){
  loading=true;page++;
  try{
    const res=await API.videos.feed(currentCat,page);
    const nv=res.videos||[];
    nv.forEach(v=>{if(v.is_liked)liked.add(v.id);if(v.is_saved)saved.add(v.id);});
    videos=[...videos,...nv];hasMore=videos.length<(res.total||0);
    appendSlides(nv);
  }catch{}
  loading=false;
}

async function loadCategory(cat,el){
  currentCat=cat;
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  if(el) el.classList.add('active');
  await loadFeed();
}

function renderFeed(){
  if(!videos.length){
    document.getElementById('feed').innerHTML=`
      <div class="empty-feed">
        <i data-lucide="film"></i>
        <div style="font-size:15px;font-weight:600;color:var(--text)">لا توجد مقاطع في هذه الفئة</div>
        <a href="/upload.html" class="btn btn-primary mt-8"><i data-lucide="upload"></i> أضف أول مقطع</a>
      </div>`;
    lucide.createIcons();return;
  }
  document.getElementById('feed').innerHTML=videos.map(buildSlide).join('');
  setupObserver();updateNowPlaying(videos[0]);
  lucide.createIcons({nodes:[document.getElementById('feed')]});
}

function appendSlides(nv){
  const feed=document.getElementById('feed');
  nv.forEach(v=>{
    const d=document.createElement('div');d.innerHTML=buildSlide(v);
    feed.appendChild(d.firstChild);
  });
  setupObserver();
  lucide.createIcons({nodes:[feed]});
}

function buildSlide(v){
  const cl=UI.catLabel(v.category),ci=UI.catIcon(v.category);
  const il=liked.has(v.id),is=saved.has(v.id);
  const ini=(v.author_name||'م')[0];
  // استخدام video_url الحقيقي من Cloudinary
  const videoSrc = v.video_url || '';
  const thumbSrc = v.thumbnail_url || '';

  return `<div class="video-slide" id="slide-${v.id}" data-id="${v.id}">
    ${videoSrc
      ? `<video class="video-el" id="vid-${v.id}"
           src="${videoSrc}"
           ${thumbSrc ? `poster="${thumbSrc}"` : ''}
           loop playsinline muted preload="metadata"></video>`
      : `<div style="position:absolute;inset:0;background:linear-gradient(135deg,#1a1a2e,#0f3460);display:flex;align-items:center;justify-content:center;opacity:.4">
           <i data-lucide="film" style="width:80px;height:80px;stroke:white;fill:none;stroke-width:1;opacity:.3"></i>
         </div>`
    }
    <div class="slide-top">
      <span class="cat-badge-video"><i data-lucide="${ci}"></i>${cl}</span>
      <span class="slide-time">${UI.timeAgo(v.created_at)}</span>
    </div>
    <div class="slide-actions">
      <button class="action-btn${il?' liked':''}" id="lb-${v.id}" onclick="toggleLike(${v.id})">
        <div class="action-icon"><i data-lucide="heart"></i></div>
        <span class="action-count" id="lc-${v.id}">${UI.formatNum(v.likes_count)}</span>
      </button>
      <button class="action-btn${is?' saved':''}" id="sb-${v.id}" onclick="toggleSave(${v.id})">
        <div class="action-icon"><i data-lucide="bookmark"></i></div>
        <span class="action-count">${UI.formatNum(v.saves_count)}</span>
      </button>
      <button class="action-btn" onclick="shareVideo()">
        <div class="action-icon"><i data-lucide="share-2"></i></div>
        <span class="action-count">مشاركة</span>
      </button>
    </div>
    <div class="slide-info">
      <div class="slide-title">${v.title}</div>
      <div class="slide-desc">${v.description||''}</div>
      <div class="slide-author">
        <div class="author-ava">${ini}</div>
        <div>
          <div class="author-name">${v.author_name||'مجهول'}</div>
          <div class="author-handle">${v.author_handle||''} · ${UI.formatNum(v.views)} مشاهدة</div>
        </div>
      </div>
    </div>
  </div>`;
}

// مراقبة الفيديوهات وتشغيلها تلقائياً
function setupObserver(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const vid=e.target.querySelector('video');
      if(e.isIntersecting){
        const id=+e.target.dataset.id,v=videos.find(v=>v.id===id);
        if(v){currentIndex=videos.indexOf(v);updateNowPlaying(v);}
        if(vid){
          vid.muted=muted;
          vid.play().catch(()=>{
            // إذا فشل التشغيل التلقائي، اعرض hint للمستخدم
            showTapHint(e.target);
          });
        }
      }else{
        if(vid){vid.pause();vid.currentTime=0;}
        e.target.querySelector('.tap-hint')?.remove();
      }
    });
  },{threshold:0.7});
  document.querySelectorAll('.video-slide').forEach(s=>obs.observe(s));
}

function showTapHint(slide){
  if(slide.querySelector('.tap-hint')) return;
  const hint=document.createElement('div');
  hint.className='tap-hint';
  hint.innerHTML='<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg> اضغط لتشغيل الصوت';
  hint.onclick=()=>{ muted=false; slide.querySelector('video')?.play(); document.querySelectorAll('.feed video').forEach(v=>v.muted=false); hint.remove(); updateMuteBtn(); };
  slide.appendChild(hint);
}

function updateNowPlaying(v){
  if(!v)return;
  document.getElementById('nowPlayingTitle').textContent=v.title;
  document.getElementById('progress').style.width=((currentIndex+1)/videos.length*100)+'%';
}

async function toggleLike(id){
  if(!API.isLoggedIn()){window.location.href='/login.html';return;}
  const btn=document.getElementById(`lb-${id}`),cnt=document.getElementById(`lc-${id}`);
  try{
    const res=await API.videos.like(id);
    if(res.liked){liked.add(id);btn.classList.add('liked');heartPop();}
    else{liked.delete(id);btn.classList.remove('liked');}
    cnt.textContent=UI.formatNum(res.count);
  }catch(e){UI.error(e.message);}
}

async function toggleSave(id){
  if(!API.isLoggedIn()){window.location.href='/login.html';return;}
  const btn=document.getElementById(`sb-${id}`);
  try{
    const res=await API.videos.save(id);
    if(res.saved){saved.add(id);btn.classList.add('saved');UI.success('تم الحفظ');}
    else{saved.delete(id);btn.classList.remove('saved');UI.toast('تم إلغاء الحفظ');}
  }catch(e){UI.error(e.message);}
}

async function loadTrending(){
  try{
    const list=await API.videos.trending();
    document.getElementById('trendingList').innerHTML=list.length
      ?list.map((v,i)=>`
        <div class="trending-item" onclick="jumpToVideo(${v.id})">
          <div class="t-num">0${i+1}</div>
          ${v.thumbnail_url
            ?`<img class="t-thumb" src="${v.thumbnail_url}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=t-thumb-placeholder><i data-lucide=film></i></div>'">`
            :`<div class="t-thumb-placeholder"><i data-lucide="film"></i></div>`}
          <div class="trending-info">
            <div class="t-title">${v.title}</div>
            <div class="t-meta"><i data-lucide="eye"></i>${UI.formatNum(v.views)} · <i data-lucide="heart"></i>${UI.formatNum(v.likes_count)}</div>
          </div>
        </div>`).join('')
      :'<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">لا توجد مقاطع بعد</div>';
    lucide.createIcons({nodes:[document.getElementById('trendingList')]});
  }catch{}
}

function jumpToVideo(id){const idx=videos.findIndex(v=>v.id===id);if(idx>=0)jumpTo(idx);}
function jumpTo(i){const s=document.querySelectorAll('.video-slide');if(s[i])s[i].scrollIntoView({behavior:'smooth'});}

function toggleMute(){
  muted=!muted;
  document.querySelectorAll('.feed video').forEach(v=>v.muted=muted);
  const t=document.getElementById('muteToast');
  t.innerHTML=muted
    ?'<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>'
    :'<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),900);
  updateMuteBtn();
}

function updateMuteBtn(){
  const mb=document.getElementById('muteBtn');
  mb.innerHTML=muted?'<i data-lucide="volume-x"></i>':'<i data-lucide="volume-2"></i>';
  lucide.createIcons({nodes:[mb]});
}

function shareVideo(){navigator.clipboard?.writeText(location.href).then(()=>UI.success('تم نسخ الرابط'));}
function goSaved(){if(!API.isLoggedIn()){window.location.href='/login.html';return;}window.location.href='/profile.html#saved';}
function setNav(btn){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function heartPop(){
  const h=document.createElement('div');
  h.style.cssText='position:fixed;z-index:999;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;color:var(--danger);animation:hpop .6s ease forwards';
  h.innerHTML='<svg width="56" height="56" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
  document.body.appendChild(h);setTimeout(()=>h.remove(),650);
}
const st=document.createElement('style');
st.textContent='@keyframes hpop{0%{opacity:1;transform:translate(-50%,-50%) scale(.4)}60%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}';
document.head.appendChild(st);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();jumpTo(currentIndex+1);}
  if(e.key==='ArrowUp'){e.preventDefault();jumpTo(currentIndex-1);}
  if(e.key==='m')toggleMute();
  if(e.key==='l')toggleLike(videos[currentIndex]?.id);
});
</script>
</body>
</html>
