<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بصير — البحث</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
.search-hero{background:linear-gradient(135deg,#0a1628,#1a3a2a);padding:48px 32px;text-align:center;border-bottom:1px solid var(--border)}
.search-hero-title{font-size:28px;font-weight:700;margin-bottom:8px}
.search-hero-sub{font-size:14px;color:var(--muted);margin-bottom:28px}
.search-bar-wrap{display:flex;max-width:560px;margin:0 auto;gap:0}
.search-bar{flex:1;background:var(--surface);border:1px solid var(--border2);border-left:none;color:var(--text);font-size:15px;padding:14px 20px;outline:none;font-family:var(--font-main);transition:border-color .2s;border-radius:var(--radius-sm) 0 0 var(--radius-sm)}
.search-bar:focus{border-color:rgba(200,245,100,.5)}
.search-bar::placeholder{color:var(--muted)}
.search-submit{background:var(--accent);border:none;color:#000;font-weight:700;padding:0 22px;font-size:14px;cursor:pointer;border-radius:0 var(--radius-sm) var(--radius-sm) 0;transition:opacity .2s;font-family:var(--font-main);display:flex;align-items:center;gap:8px}
.search-submit:hover{opacity:.88}
.search-submit svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.search-content{max-width:1100px;margin:0 auto;padding:32px}
.result-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:28px}
.result-tab{padding:10px 20px;font-size:14px;font-family:var(--font-main);cursor:pointer;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.result-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.videos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px}
.video-card{border-radius:var(--radius-md);overflow:hidden;cursor:pointer;position:relative;aspect-ratio:9/16;background:var(--surface2);border:1px solid var(--border);transition:transform .2s,border-color .2s}
.video-card:hover{transform:scale(1.02);border-color:rgba(200,245,100,.3)}
.video-thumb{width:100%;height:100%;object-fit:cover}
.video-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.video-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.video-card-title{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:3px}
.video-card-meta{font-size:11px;color:var(--muted)}
.users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.user-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;text-align:center;cursor:pointer;transition:border-color .2s}
.user-card:hover{border-color:rgba(200,245,100,.3)}
.user-card-ava{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#000;margin:0 auto 12px}
.user-card-name{font-weight:600;margin-bottom:3px;display:flex;align-items:center;justify-content:center;gap:5px}
.user-card-handle{font-size:12px;color:var(--muted);font-family:var(--font-mono);margin-bottom:8px}
.user-card-bio{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.load-more{text-align:center;margin-top:28px}
.empty-search{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-search svg{width:56px;height:56px;stroke:currentColor;fill:none;stroke-width:1.2;opacity:.3;margin-bottom:16px}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
@media(max-width:600px){.search-hero{padding:32px 16px}.search-content{padding:20px 16px}.videos-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<nav class="topnav">
  <a href="/index.html" class="nav-logo">بصير</a>
  <div class="nav-links">
    <a href="/index.html" class="btn"><i data-lucide="house"></i> الرئيسية</a>
    <a href="/upload.html" class="btn btn-primary hide-mobile"><i data-lucide="upload"></i> رفع</a>
    <a href="/profile.html" class="btn btn-secondary"><i data-lucide="user"></i></a>
  </div>
</nav>

<div class="search-hero">
  <div class="search-hero-title">اكتشف المزيد 🔍</div>
  <div class="search-hero-sub">ابحث عن مقاطع أو مستخدمين</div>
  <div class="search-bar-wrap">
    <input class="search-bar" id="searchInput" type="text"
      placeholder="ابحث عن فيديو، تصنيف، أو مستخدم..."
      onkeydown="if(event.key==='Enter') doSearch()"
      oninput="liveSearch()">
    <button class="search-submit" onclick="doSearch()">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      بحث
    </button>
  </div>
</div>

<div class="search-content">
  <div id="initialState">
    <div class="empty-search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">ابحث عن شيء</div>
      <div>اكتب في مربع البحث للعثور على فيديوهات ومستخدمين</div>
      <div class="suggestions">
        <button class="cat-chip" onclick="quickSearch('طبيعة')">🌿 طبيعة</button>
        <button class="cat-chip" onclick="quickSearch('فن')">🎨 فن</button>
        <button class="cat-chip" onclick="quickSearch('بحر')">🌊 بحر</button>
        <button class="cat-chip" onclick="quickSearch('مدينة')">🏙️ مدينة</button>
        <button class="cat-chip" onclick="quickSearch('طعام')">🍜 طعام</button>
        <button class="cat-chip" onclick="quickSearch('عمارة')">🏛️ عمارة</button>
      </div>
    </div>
  </div>

  <div id="resultsState" style="display:none">
    <div class="result-tabs">
      <button class="result-tab active" id="tabVideos" onclick="switchTab('videos')">
        فيديوهات <span id="videosBadge" class="badge badge-muted" style="margin-right:6px"></span>
      </button>
      <button class="result-tab" id="tabUsers" onclick="switchTab('users')">
        مستخدمون <span id="usersBadge" class="badge badge-muted" style="margin-right:6px"></span>
      </button>
    </div>

    <div id="videosResults">
      <div class="videos-grid" id="videosGrid"></div>
      <div class="load-more" id="loadMoreWrap" style="display:none">
        <button class="btn btn-secondary" onclick="loadMore()">تحميل المزيد</button>
      </div>
    </div>

    <div id="usersResults" style="display:none">
      <div class="users-grid" id="usersGrid"></div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
let currentQuery = '', videoPage = 1, totalVideos = 0, searchTimer = null;
let allVideos = [];

window.addEventListener('load', () => {
  lucide.createIcons();
  const params = new URLSearchParams(location.search);
  const q = params.get('q');
  if (q) {
    document.getElementById('searchInput').value = q;
    execSearch(q);
  }
});

function quickSearch(q) {
  document.getElementById('searchInput').value = q;
  doSearch();
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  history.replaceState({}, '', `/search.html?q=${encodeURIComponent(q)}`);
  execSearch(q);
}

function liveSearch() {
  clearTimeout(searchTimer);
  const q = document.getElementById('searchInput').value.trim();
  if (q.length < 2) return;
  searchTimer = setTimeout(() => doSearch(), 500);
}

async function execSearch(q) {
  currentQuery = q; videoPage = 1; allVideos = [];
  document.getElementById('initialState').style.display  = 'none';
  document.getElementById('resultsState').style.display  = 'block';
  document.getElementById('videosGrid').innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px">جاري البحث...</div>';
  document.getElementById('usersGrid').innerHTML  = '<div style="padding:20px;color:var(--muted);font-size:13px">جاري البحث...</div>';

  const [videosRes, usersRes] = await Promise.allSettled([
    API.videos.search(q, 1),
    API.users.search(q),
  ]);

  // Videos
  if (videosRes.status === 'fulfilled') {
    const data = videosRes.value;
    allVideos  = data.videos || [];
    totalVideos = data.total || 0;
    document.getElementById('videosBadge').textContent = totalVideos;
    renderVideos();
    document.getElementById('loadMoreWrap').style.display =
      allVideos.length < totalVideos ? 'block' : 'none';
  } else {
    document.getElementById('videosGrid').innerHTML = '<div class="empty-search"><div>فشل تحميل النتائج</div></div>';
  }

  // Users
  if (usersRes.status === 'fulfilled') {
    const users = usersRes.value || [];
    document.getElementById('usersBadge').textContent = users.length;
    renderUsers(users);
  }
}

async function loadMore() {
  videoPage++;
  const data = await API.videos.search(currentQuery, videoPage);
  allVideos = [...allVideos, ...(data.videos || [])];
  renderVideos();
  document.getElementById('loadMoreWrap').style.display =
    allVideos.length < totalVideos ? 'block' : 'none';
}

function renderVideos() {
  const el = document.getElementById('videosGrid');
  if (!allVideos.length) {
    el.innerHTML = `<div class="empty-search" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      <div>لا توجد فيديوهات مطابقة لـ "<strong>${esc(currentQuery)}</strong>"</div>
    </div>`;
    return;
  }
  el.innerHTML = allVideos.map(v => `
    <div class="video-card" onclick="window.location.href='/index.html?vid=${v.id}'">
      ${v.thumbnail_url
        ? `<img class="video-thumb" src="${v.thumbnail_url}" loading="lazy">`
        : `<div class="video-thumb-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></div>`}
      <div class="video-overlay">
        <div class="video-card-title">${esc(v.title)}</div>
        <div class="video-card-meta">${v.author_name || ''} · ${UI.formatNum(v.views)} مشاهدة</div>
      </div>
    </div>`).join('');
}

function renderUsers(users) {
  const el = document.getElementById('usersGrid');
  if (!users.length) {
    el.innerHTML = `<div class="empty-search" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <div>لا يوجد مستخدمون مطابقون لـ "<strong>${esc(currentQuery)}</strong>"</div>
    </div>`;
    return;
  }
  el.innerHTML = users.map(u => `
    <div class="user-card" onclick="window.location.href='/profile.html?handle=${encodeURIComponent(u.handle)}'">
      <div class="user-card-ava">${(u.name||'م')[0]}</div>
      <div class="user-card-name">
        ${esc(u.name)}
        ${u.verified ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--accent2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>` : ''}
      </div>
      <div class="user-card-handle">${u.handle}</div>
      ${u.bio ? `<div class="user-card-bio">${esc(u.bio)}</div>` : ''}
    </div>`).join('');
}

function switchTab(tab) {
  document.getElementById('tabVideos').classList.toggle('active', tab === 'videos');
  document.getElementById('tabUsers').classList.toggle('active',  tab === 'users');
  document.getElementById('videosResults').style.display = tab === 'videos' ? 'block' : 'none';
  document.getElementById('usersResults').style.display  = tab === 'users'  ? 'block' : 'none';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
