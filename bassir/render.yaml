services:
  - type: web
    name: baseer
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: baseer-db
          property: connectionString

databases:
  - name: baseer-db
    plan: free
