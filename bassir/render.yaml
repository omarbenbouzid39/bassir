services:
  - type: web
    name: baseer
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /opt/render/project/src/baseer.db
    disk:
      name: baseer-data
      mountPath: /opt/render/project/src
      sizeGB: 1
