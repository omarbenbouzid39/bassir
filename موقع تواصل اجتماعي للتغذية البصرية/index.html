<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بصير — تغذية بصرية</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
html, body { height: 100%; overflow: hidden; }
.app { display: grid; grid-template-columns: 72px 1fr 300px; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar { display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-left: 1px solid var(--border); gap: 6px; background: var(--surface); z-index: 10; }
.sidebar-logo { font-family: var(--font-mono); font-size: 14px; color: var(--accent); writing-mode: vertical-rl; letter-spacing: 4px; margin-bottom: 20px; }
.nav-btn { width: 44px; height: 44px; border-radius: var(--radius-sm); border: none; background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; position: relative; }
.nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
.nav-btn:hover, .nav-btn.active { background: rgba(200,245,100,0.1); color: var(--accent); }
.nav-tooltip { position: absolute; right: 54px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 4px 10px; border-radius: 6px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; font-family: var(--font-main); }
.nav-btn:hover .nav-tooltip { opacity: 1; }
.sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 6px; }

/* FEED */
.feed-container { position: relative; overflow: hidden; background: #000; }
.feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
.feed::-webkit-scrollbar { display: none; }

.video-slide { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.video-bg { position: absolute; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: min(26vw, 240px); opacity: 0.3; transition: transform 6s ease; }
.video-slide:hover .video-bg { transform: scale(1.04); }
.video-slide::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.2) 40%, transparent 70%); pointer-events: none; }

.slide-top { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 5; }
.cat-badge-video { background: rgba(200,245,100,0.15); border: 1px solid rgba(200,245,100,0.3); color: var(--accent); font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: var(--radius-full); backdrop-filter: blur(8px); display: flex; align-items: center; gap: 5px; }
.cat-badge-video svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.slide-time { font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.5); }

.slide-actions { position: absolute; left: 16px; bottom: 120px; z-index: 5; display: flex; flex-direction: column; gap: 20px; align-items: center; }
.action-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; background: none; border: none; color: white; cursor: pointer; transition: transform 0.2s; }
.action-btn:hover  { transform: scale(1.15); }
.action-btn:active { transform: scale(0.95); }
.action-icon { width: 46px; height: 46px; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.14); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.action-icon svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
.action-btn.liked .action-icon  { background: rgba(245,100,100,0.2); border-color: var(--danger);  color: var(--danger);  }
.action-btn.liked .action-icon svg { fill: var(--danger); }
.action-btn.saved .action-icon  { background: rgba(200,245,100,0.15); border-color: var(--accent); color: var(--accent); }
.action-btn.saved .action-icon svg { fill: var(--accent); }
.action-count { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 500; }

.slide-info { position: absolute; bottom: 32px; right: 20px; left: 20px; z-index: 5; }
.slide-title  { font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
.slide-desc   { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.6; max-width: 380px; }
.slide-author { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
.author-ava   { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.author-name   { font-size: 13px; font-weight: 500; }
.author-handle { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.author-handle svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }

.top-progress      { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.08); z-index: 10; }
.top-progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.15s linear; }

/* RIGHT PANEL */
.right-panel { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.panel-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.panel-title { font-size: 14px; font-weight: 700; }
.panel-sub   { font-size: 11px; color: var(--muted); }
.panel-header-icon { color: var(--accent); }
.panel-header-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

.cats-scroll { display: flex; gap: 8px; padding: 12px 20px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
.cats-scroll::-webkit-scrollbar { display: none; }

.now-playing { display: flex; align-items: center; gap: 10px; padding: 11px 20px; background: rgba(200,245,100,0.05); border-bottom: 1px solid rgba(200,245,100,0.1); }
.playing-bars { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
.bar { width: 3px; background: var(--accent); border-radius: 2px; animation: audioBar 0.8s ease infinite alternate; }
.bar:nth-child(2) { animation-delay: 0.2s; }
.bar:nth-child(3) { animation-delay: 0.4s; }
@keyframes audioBar { from{height:4px}to{height:14px} }
.playing-text  { font-size: 12px; color: var(--accent); font-weight: 500; }
.playing-title { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

.trending-list  { flex: 1; overflow-y: auto; padding: 14px 20px; scrollbar-width: none; }
.trending-list::-webkit-scrollbar { display: none; }
.trending-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
.trending-item  { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.2s; align-items: center; }
.trending-item:hover { opacity: 0.7; }
.trending-thumb { width: 50px; height: 70px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.trending-info  { flex: 1; min-width: 0; }
.trending-item-title { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 3px; }
.trending-meta  { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.trending-meta svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }
.trending-num   { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.06); width: 22px; flex-shrink: 0; }

.panel-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; }

.mute-toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.85); border: 1px solid var(--border); padding: 20px 28px; border-radius: var(--radius-lg); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; }
.mute-toast svg { width: 36px; height: 36px; stroke: white; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
.mute-toast.show { opacity: 1; }

@media (max-width: 900px) { .app { grid-template-columns: 60px 1fr; } .right-panel { display: none; } }
@media (max-width: 600px) { .app { grid-template-columns: 1fr; } .sidebar { display: none; } }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo">بصير</div>
    <button class="nav-btn active" onclick="setNav(this)">
      <i data-lucide="house"></i><span class="nav-tooltip">الرئيسية</span>
    </button>
    <button class="nav-btn" onclick="setNav(this)">
      <i data-lucide="search"></i><span class="nav-tooltip">استكشاف</span>
    </button>
    <button class="nav-btn" onclick="setNav(this)">
      <i data-lucide="bookmark"></i><span class="nav-tooltip">المحفوظات</span>
    </button>
    <button class="nav-btn" onclick="setNav(this)">
      <i data-lucide="trending-up"></i><span class="nav-tooltip">الرائج</span>
    </button>
    <button class="nav-btn" onclick="setNav(this)">
      <i data-lucide="bell"></i><span class="nav-tooltip">الإشعارات</span>
    </button>
    <div class="sidebar-bottom">
      <button class="nav-btn" onclick="setNav(this)">
        <i data-lucide="settings"></i><span class="nav-tooltip">الإعدادات</span>
      </button>
      <a href="profile.html" class="avatar avatar-sm" style="border:2px solid var(--border)">أ</a>
    </div>
  </nav>

  <!-- FEED -->
  <main class="feed-container">
    <div class="top-progress"><div class="top-progress-fill" id="progress"></div></div>
    <div class="feed" id="feed"></div>
    <div class="mute-toast" id="muteToast"><i data-lucide="volume-x"></i></div>
  </main>

  <!-- RIGHT PANEL -->
  <aside class="right-panel">
    <div class="panel-header">
      <div><div class="panel-title">بصير</div><div class="panel-sub">تغذية بصرية يومية</div></div>
      <span class="panel-header-icon"><i data-lucide="sparkles"></i></span>
    </div>
    <div class="now-playing">
      <div class="playing-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
      <div style="min-width:0">
        <div class="playing-text">يُعرض الآن</div>
        <div class="playing-title" id="nowPlayingTitle">—</div>
      </div>
    </div>
    <div class="cats-scroll" id="catsRow"></div>
    <div class="trending-list">
      <div class="trending-label">الأكثر مشاهدة</div>
      <div id="trendingList"></div>
    </div>
    <div class="panel-footer">
      <a href="upload.html" class="btn btn-primary btn-full">
        <i data-lucide="upload"></i> رفع مقطع
      </a>
      <button class="btn btn-icon btn-secondary" id="muteBtn" onclick="toggleMute()" title="كتم">
        <i data-lucide="volume-2"></i>
      </button>
      <button class="btn btn-icon btn-secondary" onclick="shareVideo()" title="مشاركة">
        <i data-lucide="share-2"></i>
      </button>
    </div>
  </aside>
</div>

<script>
const VIDEOS = [
  { id:1, title:'جبال الأطلس عند الغروب',    desc:'ألوان الغروب تلوّن قمم جبال الأطلس بتدرجات برتقالية رائعة', category:'nature', catLabel:'طبيعة', catIcon:'leaf',     author:'ليلى عمراني', handle:'@leila_visuals', initials:'ل', color:'#ff6b35', bg:'linear-gradient(160deg,#ff6b35,#f7931e 30%,#2c1654)', emoji:'🏔️', likes:'24.2K', saves:'3.1K', views:'198K' },
  { id:2, title:'قصبة الجزائر — أزقة الزمن', desc:'جولة في أعماق القصبة حيث الجدران تحكي قصص ألف عام',      category:'arch',   catLabel:'عمارة',  catIcon:'landmark',  author:'كريم بوعزيز', handle:'@karim.arch',   initials:'ك', color:'#64d4f5', bg:'linear-gradient(160deg,#0a2540,#1a5276,#64d4f5)', emoji:'🕌', likes:'18.7K', saves:'5.8K', views:'142K' },
  { id:3, title:'الصحراء الكبرى — بحر الرمال',desc:'كثبان رملية ذهبية وصمت مطبق في عمق الصحراء',           category:'nature', catLabel:'طبيعة', catIcon:'leaf',     author:'سارة بن علي', handle:'@sahara.eye',   initials:'س', color:'#f5d464', bg:'linear-gradient(160deg,#8B4513,#D2691E,#FFD700)', emoji:'🏜️', likes:'41.5K', saves:'9.2K', views:'320K' },
  { id:4, title:'فن الخط العربي المعاصر',     desc:'فنان يحوّل الحروف إلى لوحات تمزج التراث بالحداثة',     category:'art',    catLabel:'فن',     catIcon:'palette',   author:'يوسف الخطاط', handle:'@youssef.art',  initials:'ي', color:'#c8f564', bg:'linear-gradient(160deg,#1a1a2e,#16213e,#0f3460)', emoji:'✍️', likes:'33.1K', saves:'7.4K', views:'211K' },
  { id:5, title:'شاطئ وهران — ساعة الذهب',   desc:'أمواج المتوسط تتكسر على شواطئ وهران عند الغروب',       category:'sea',    catLabel:'بحر',    catIcon:'waves',     author:'أمير راشدي',  handle:'@amir.sea',    initials:'أ', color:'#64d4f5', bg:'linear-gradient(160deg,#006994,#0099cc,#ff8c00)', emoji:'🌊', likes:'29.8K', saves:'4.6K', views:'176K' },
  { id:6, title:'مطبخ جزائري — الكسكسي',     desc:'إعداد كسكسي أصيل بكل مكوناته التقليدية',              category:'food',   catLabel:'طعام',   catIcon:'utensils',  author:'نادية الطباخة',handle:'@nadia.cuisine',initials:'ن', color:'#f5a064', bg:'linear-gradient(160deg,#3d1c02,#8b4513,#d4880a)', emoji:'🍲', likes:'52.3K', saves:'15.7K',views:'440K' },
];

const CATS = [
  {val:'all',label:'الكل',icon:'layout-grid'},
  {val:'nature',label:'طبيعة',icon:'leaf'},
  {val:'art',label:'فن',icon:'palette'},
  {val:'arch',label:'عمارة',icon:'landmark'},
  {val:'food',label:'طعام',icon:'utensils'},
  {val:'sea',label:'بحر',icon:'waves'},
];

let currentIndex = 0, muted = false;
const likedSet = new Set(), savedSet = new Set();

// SVG icon helper (inline for feed slides where lucide.createIcons can't reach)
function svg(name) {
  const icons = {
    heart: '<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>',
    bookmark:'<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>',
    'share-2':'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',
    eye: '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>',
    user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  };
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${icons[name]||''}</svg>`;
}

function renderCats() {
  document.getElementById('catsRow').innerHTML = CATS.map((c,i) =>
    `<button class="cat-chip${i===0?' active':''}" onclick="filterCat(this,'${c.val}')">
      <i data-lucide="${c.icon}"></i>${c.label}
    </button>`
  ).join('');
  lucide.createIcons();
}

function buildSlide(v) {
  return `<div class="video-slide" id="slide-${v.id}" onclick="handleClick()">
    <div class="video-bg" style="background:${v.bg}">${v.emoji}</div>
    <div class="slide-top">
      <span class="cat-badge-video">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${getCatPath(v.catIcon)}</svg>
        ${v.catLabel}
      </span>
      <span class="slide-time">${getTime()}</span>
    </div>
    <div class="slide-actions">
      <button class="action-btn${likedSet.has(v.id)?' liked':''}" onclick="event.stopPropagation();toggleLike(${v.id})" id="lb-${v.id}">
        <div class="action-icon">${svg('heart')}</div>
        <span class="action-count">${v.likes}</span>
      </button>
      <button class="action-btn${savedSet.has(v.id)?' saved':''}" onclick="event.stopPropagation();toggleSave(${v.id})" id="sb-${v.id}">
        <div class="action-icon">${svg('bookmark')}</div>
        <span class="action-count">${v.saves}</span>
      </button>
      <button class="action-btn" onclick="event.stopPropagation();shareVideo()">
        <div class="action-icon">${svg('share-2')}</div>
        <span class="action-count">مشاركة</span>
      </button>
    </div>
    <div class="slide-info">
      <div class="slide-title">${v.title}</div>
      <div class="slide-desc">${v.desc}</div>
      <div class="slide-author">
        <div class="author-ava" style="background:${v.color}22;border-color:${v.color}55;color:${v.color}">${v.initials}</div>
        <div>
          <div class="author-name">${v.author}</div>
          <div class="author-handle">
            ${svg('eye')} ${v.views} · ${v.handle}
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function getCatPath(icon) {
  const paths = {
    leaf: '<path d="M2 22 16 8"/><path d="M16.47 7.35A9 9 0 0 1 20 15c0 3.87-2.5 6-8 7-5.5-1-8-3.13-8-7a9 9 0 0 1 3.53-7.65A9 9 0 0 1 12 6a9 9 0 0 1 4.47 1.35z"/>',
    landmark: '<line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/>',
    palette: '<circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>',
    waves: '<path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>',
    utensils: '<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>',
    'layout-grid': '<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',
  };
  return paths[icon] || '';
}

function renderTrending() {
  document.getElementById('trendingList').innerHTML = VIDEOS.map((v,i) => `
    <div class="trending-item" onclick="jumpTo(${i})">
      <div class="trending-num">0${i+1}</div>
      <div class="trending-thumb" style="background:${v.bg}">${v.emoji}</div>
      <div class="trending-info">
        <div class="trending-item-title">${v.title}</div>
        <div class="trending-meta">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          ${v.views} · ${v.catLabel}
        </div>
      </div>
    </div>`).join('');
}

function renderFeed(filter='all') {
  const list = filter==='all' ? VIDEOS : VIDEOS.filter(v=>v.category===filter);
  document.getElementById('feed').innerHTML = list.map(buildSlide).join('');
  setupObserver();
}

function setupObserver() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = +e.target.id.replace('slide-','');
        const v  = VIDEOS.find(v=>v.id===id);
        if (v) {
          currentIndex = VIDEOS.indexOf(v);
          document.getElementById('nowPlayingTitle').textContent = v.title;
          document.getElementById('progress').style.width = ((currentIndex+1)/VIDEOS.length*100)+'%';
        }
      }
    });
  }, { threshold: 0.6 });
  document.querySelectorAll('.video-slide').forEach(s=>obs.observe(s));
}

function toggleLike(id) {
  const btn = document.getElementById(`lb-${id}`);
  likedSet.has(id) ? (likedSet.delete(id), btn.classList.remove('liked')) : (likedSet.add(id), btn.classList.add('liked'), heartPop());
}
function toggleSave(id) {
  const btn = document.getElementById(`sb-${id}`);
  savedSet.has(id) ? (savedSet.delete(id), btn.classList.remove('saved')) : (savedSet.add(id), btn.classList.add('saved'));
}
function toggleMute() {
  muted = !muted;
  const toast = document.getElementById('muteToast');
  toast.innerHTML = muted
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 900);
  const muteBtn = document.getElementById('muteBtn');
  muteBtn.innerHTML = muted
    ? '<i data-lucide="volume-x"></i>'
    : '<i data-lucide="volume-2"></i>';
  lucide.createIcons({ nodes: [muteBtn] });
}
function filterCat(el, cat) {
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); renderFeed(cat);
}
function jumpTo(i) {
  const slides = document.querySelectorAll('.video-slide');
  if (slides[i]) slides[i].scrollIntoView({behavior:'smooth'});
}
function handleClick() { toggleMute(); }
function shareVideo() {
  navigator.clipboard?.writeText(location.href).then(()=>showToast('تم نسخ الرابط'));
}
function setNav(btn) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function getTime() { return new Date().toLocaleTimeString('ar-DZ',{hour:'2-digit',minute:'2-digit'}); }
function heartPop() {
  const h = document.createElement('div');
  h.style.cssText = 'position:fixed;z-index:999;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;color:var(--danger);animation:hpop .6s ease forwards';
  h.innerHTML = '<svg width="56" height="56" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
  document.body.appendChild(h); setTimeout(()=>h.remove(), 650);
}
function showToast(msg) {
  let t = document.getElementById('gToast');
  if (!t) { t = document.createElement('div'); t.id='gToast'; t.className='toast success'; document.body.appendChild(t); }
  t.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> ${msg}`;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500);
}
document.addEventListener('keydown', e => {
  if (e.key==='ArrowDown'||e.key===' ') { e.preventDefault(); jumpTo(currentIndex+1); }
  if (e.key==='ArrowUp')  { e.preventDefault(); jumpTo(currentIndex-1); }
  if (e.key==='m') toggleMute();
  if (e.key==='l') toggleLike(VIDEOS[currentIndex]?.id);
});
const s = document.createElement('style');
s.textContent = '@keyframes hpop{0%{opacity:1;transform:translate(-50%,-50%) scale(.4)}60%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}';
document.head.appendChild(s);

renderCats(); renderFeed(); renderTrending();
window.addEventListener('load', () => lucide.createIcons());
</script>
</body>
</html>
